<!doctype html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>matroska-inspector · local hex viewer</title>
    <style>
        :root {
            --bg: #0e1014;
            --bg-elev: #161a21;
            --bg-elev-2: #1d222b;
            --border: #2a313d;
            --text: #d7dde6;
            --text-dim: #8b95a5;
            --accent: #6cb6ff;
            --accent-soft: #1f3146;
            --green: #7ee787;
            --amber: #e3b341;
            --purple: #c099ff;
            --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---------- header ---------- */
        header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 18px;
            background: var(--bg-elev);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: var(--mono);
            font-weight: 600;
            letter-spacing: .04em;
            white-space: nowrap;
        }
        .brand .dot { color: var(--accent); }
        .brand .sub { color: var(--text-dim); font-weight: 400; }

        #drop {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 16px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            transition: border-color .15s, background .15s, color .15s;
            min-width: 0;
        }
        #drop:hover { border-color: var(--accent); color: var(--text); }
        #drop.drag { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
        #drop .fname { color: var(--text); font-family: var(--mono); }
        #drop b { color: var(--accent); }

        .intake-or {
            flex: 0 0 auto;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        #url-form {
            flex: 1 1 auto;
            display: flex;
            gap: 8px;
            min-width: 0;
            margin: 0;
        }
        #url {
            flex: 1 1 auto;
            min-width: 0;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-elev-2);
            color: var(--text);
            font-family: var(--mono);
            font-size: 12.5px;
            outline: none;
            transition: border-color .15s;
        }
        #url::placeholder { color: var(--text-dim); }
        #url:focus { border-color: var(--accent); }
        #url-form button {
            flex: 0 0 auto;
            padding: 0 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            font-family: var(--sans);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: border-color .15s, background .15s;
        }
        #url-form button:hover { border-color: var(--accent); }
        #url-form button:disabled { opacity: .5; cursor: default; }

        /* ---------- metadata strip ---------- */
        #summary {
            flex: 0 0 auto;
            display: none;
            gap: 14px;
            padding: 14px 18px;
            background: var(--bg-elev);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            align-items: stretch;
        }
        #summary.show { display: flex; }

        .card {
            background: var(--bg-elev-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            min-width: 120px;
        }
        .card .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        .card .value {
            font-family: var(--mono);
            font-size: 16px;
            color: var(--text);
            white-space: nowrap;
        }
        .card.title-card { min-width: 160px; }
        .card.title-card .value { font-size: 14px; }

        .streams-card {
            flex: 1 1 auto;
            min-width: 260px;
        }
        .stream-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
            font-family: var(--mono);
            font-size: 12px;
            white-space: nowrap;
        }
        .badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .05em;
            font-family: var(--sans);
            font-weight: 600;
        }
        .badge.video { background: #15324a; color: var(--accent); }
        .badge.audio { background: #14331f; color: var(--green); }
        .badge.subtitle { background: #3a2a14; color: var(--amber); }
        .badge.other { background: #2c2440; color: var(--purple); }
        .stream-row .lang { color: var(--amber); }
        .stream-row .codec { color: var(--text-dim); }
        .stream-row .extra { color: var(--text-dim); }

        /* ---------- main split ---------- */
        main {
            flex: 1 1 auto;
            display: flex;
            min-height: 0;
        }

        #tree-pane {
            flex: 0 0 42%;
            max-width: 620px;
            min-width: 280px;
            overflow: auto;
            border-right: 1px solid var(--border);
            padding: 10px 0;
        }
        #hex-pane {
            flex: 1 1 auto;
            overflow: auto;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ---------- tree ---------- */
        ul.tree { list-style: none; margin: 0; padding: 0; }
        ul.tree ul { list-style: none; margin: 0; padding-left: 18px; }

        .node {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 3px 10px 3px 12px;
            font-family: var(--mono);
            font-size: 12.5px;
            cursor: pointer;
            border-left: 2px solid transparent;
            white-space: nowrap;
        }
        .node:hover { background: var(--bg-elev); }
        .node.selected {
            background: var(--accent-soft);
            border-left-color: var(--accent);
        }
        .twisty {
            display: inline-block;
            width: 12px;
            color: var(--text-dim);
            transition: transform .12s;
            flex: 0 0 auto;
        }
        .twisty.open { transform: rotate(90deg); }
        .twisty.leaf { visibility: hidden; }
        .node .id { color: var(--purple); }
        .node .ptype { color: var(--text-dim); }
        .node .name { color: var(--accent); }
        .node .size { color: var(--text-dim); margin-left: auto; padding-left: 14px; font-size: 11px; }
        .node .val { color: var(--green); }

        .loadmore {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 3px 12px 3px 30px;
            text-align: left;
            display: block;
        }
        .loadmore:hover { text-decoration: underline; }

        /* ---------- SeekHead navigation ---------- */
        .node .seek-target { color: var(--amber); }
        .jumpbtn {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            background: var(--accent-soft);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            padding: 0 7px;
            line-height: 1.7;
            flex: 0 0 auto;
        }
        .jumpbtn:hover { border-color: var(--accent); }
        .jump-result {
            margin-left: 18px;
            border-left: 1px solid var(--accent-soft);
        }
        .node.jumped { border-left-color: var(--amber); }
        .jump-status { color: var(--text-dim); font-family: var(--mono); font-size: 11.5px; padding-left: 30px; }
        .jump-status.err { color: var(--amber); }
        .node.jump-flash { background: var(--accent-soft); transition: background .3s; }

        /* ---------- hex ---------- */
        .hex-head {
            flex: 0 0 auto;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elev);
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }
        .hex-head .sel-id { color: var(--purple); }
        .hex-head .sel-type { color: var(--text); }
        .hex-head .note { color: var(--amber); }

        #hex {
            flex: 1 1 auto;
            overflow: auto;
            padding: 12px 16px;
            font-family: var(--mono);
            font-size: 12.5px;
            line-height: 1.5;
        }
        .hex-empty {
            color: var(--text-dim);
            font-family: var(--mono);
            padding: 40px 16px;
            text-align: center;
        }
        .hline { white-space: pre; }
        .hline .off { color: var(--text-dim); }
        .hline .hx { color: var(--text); }
        .hline .hx .z { color: #4a525f; }
        .hline .as { color: var(--green); }
        .hline .as .np { color: #4a525f; }

        .placeholder {
            margin: auto;
            text-align: center;
            color: var(--text-dim);
            padding: 60px 20px;
        }
        .placeholder h2 { color: var(--text); font-weight: 600; }
        .placeholder code {
            background: var(--bg-elev-2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: var(--mono);
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">matroska<span class="dot">·</span>web <span class="sub">hex viewer</span></div>
        <label id="drop">
            <span class="prompt">Drop a video file here, or <b>browse</b> &mdash; nothing is uploaded</span>
            <input id="file" type="file" accept="video/*,.mkv,.webm,.mka,.mks" hidden />
        </label>
        <span class="intake-or">or</span>
        <form id="url-form">
            <input id="url" type="url" placeholder="paste a video URL…" autocomplete="off" spellcheck="false" />
            <button type="submit">Load</button>
        </form>
    </header>

    <section id="summary"></section>

    <main>
        <div id="tree-pane">
            <div class="placeholder" id="tree-placeholder">
                <h2>No file loaded</h2>
                <p>Select a local <code>.mkv</code> / <code>.webm</code> file to parse it<br>
                entirely in your browser via the WebAssembly EBML reader.</p>
            </div>
            <ul class="tree" id="tree" hidden></ul>
        </div>
        <div id="hex-pane">
            <div class="hex-head" id="hex-head">Hex inspector</div>
            <div id="hex"><div class="hex-empty">&lsaquo; select an element to inspect its bytes &rsaquo;</div></div>
        </div>
    </main>

    <script type="module">
        import init, { EbmlReader, FetchSourceEbml } from "./pkg/ebml_wasm.js";

        // ---- Matroska element IDs (hex strings, lower-case, no 0x) ----
        const ID = {
            EBML: '1a45dfa3',
            Segment: '18538067',
            Info: '1549a966',
            Title: '7ba9',
            Duration: '4489',
            TimestampScale: '2ad7b1',
            MuxingApp: '4d80',
            WritingApp: '5741',
            Tracks: '1654ae6b',
            TrackEntry: 'ae',
            TrackType: '83',
            TrackName: '536e',
            Language: '22b59c',
            LanguageBCP47: '22b59d',
            CodecID: '86',
            Video: 'e0',
            PixelWidth: 'b0',
            PixelHeight: 'ba',
            DisplayWidth: '54b0',
            DisplayHeight: '54ba',
            Audio: 'e1',
            SamplingFrequency: 'b5',
            Channels: '9f',
            Cluster: '1f43b675',
            SeekHead: '114d9b74',
            Seek: '4dbb',
            SeekID: '53ab',
            SeekPosition: '53ac',
        };

        const TRACK_TYPE = { 1: 'video', 2: 'audio', 3: 'complex', 16: 'logo', 17: 'subtitle', 18: 'button', 32: 'control', 33: 'metadata' };

        const HEX_CAP = 4096; // max bytes rendered in the hex pane per element
        const BATCH = 25;     // children loaded per "load more" click

        const $ = (sel) => document.querySelector(sel);
        const idHex = (el) => el.get_id().toString(16).toLowerCase();
        const id0x = (el) => '0x' + el.get_id().toString(16).toUpperCase();

        let wasmReady = init();
        let currentSource = null;   // { name, size, ebmlUrl, readBytes(off,len) } — see *Source builders
        let selectedNode = null;
        // Absolute file offset of the Segment's payload start. SeekPosition values are relative to
        // THIS, not the file start, so jumps need it. Set in load(), reset per load.
        let segmentDataStart = null;

        // ---------- source builders ----------
        // A "source" abstracts where bytes come from: a local File (sliced directly) or a remote
        // URL (read via HTTP Range requests). `ebmlUrl` is what the wasm reader fetches; `readBytes`
        // backs the hex pane and the float decoder.
        function fileSource(file) {
            // a blob URL lets the wasm reader Range-serve the LOCAL file without an upload
            const ebmlUrl = URL.createObjectURL(file);
            return {
                name: file.name,
                size: file.size,
                ebmlUrl,
                readBytes: (off, len) => file.slice(off, off + len).arrayBuffer(),
            };
        }

        async function urlSource(url) {
            let name = url, size = 0;
            try { name = decodeURIComponent(new URL(url).pathname.split('/').pop()) || url; } catch (_) {}

            // A HEAD gives the total length up front. We deliberately do NOT do a GET range-probe:
            // if the server ignores Range and answers 200, an unread/uncancelled response body would
            // stream the WHOLE file in the background. Size is instead filled in lazily below from the
            // Content-Range of the first real ranged read (whose body we always consume).
            try {
                const head = await fetch(url, { method: 'HEAD' });
                size = Number(head.headers.get('Content-Length')) || 0;
            } catch (_) { /* size stays 0 until the first ranged read fills it in */ }

            return {
                name,
                get size() { return size; },
                ebmlUrl: url,
                async readBytes(off, len) {
                    const r = await fetch(url, { headers: { Range: `bytes=${off}-${off + len - 1}` } });
                    if (r.status !== 206) {
                        // Server ignored the Range (200 = whole file). Cancel the body so it is NOT
                        // downloaded in the background, then surface the misbehaviour.
                        r.body?.cancel?.();
                        throw new Error(`expected "206 Partial Content" but got ${r.status} — the ` +
                            `server is ignoring Range requests and would send the whole file`);
                    }
                    if (!size) {
                        const cr = r.headers.get('Content-Range');  // "bytes 0-1023/4506488235"
                        const m = cr && cr.match(/\/(\d+)\s*$/);
                        if (m) size = Number(m[1]);
                    }
                    return r.arrayBuffer();
                },
            };
        }

        // ---------- intake ----------
        const drop = $('#drop');
        const fileInput = $('#file');
        const urlForm = $('#url-form');
        const urlInput = $('#url');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) load(fileSource(e.target.files[0]));
        });
        ['dragenter', 'dragover'].forEach(ev =>
            drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('drag'); }));
        ['dragleave', 'drop'].forEach(ev =>
            drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('drag'); }));
        drop.addEventListener('drop', (e) => {
            const f = e.dataTransfer?.files?.[0];
            if (f) { load(fileSource(f)); return; }
            const u = e.dataTransfer?.getData('text/uri-list') || e.dataTransfer?.getData('text/plain');
            if (u) { urlInput.value = u.trim(); loadFromUrl(); }
        });

        urlForm.addEventListener('submit', (e) => { e.preventDefault(); loadFromUrl(); });

        async function loadFromUrl() {
            const url = urlInput.value.trim();
            if (!url) return;
            const btn = urlForm.querySelector('button');
            btn.disabled = true;
            try {
                await load(await urlSource(url));
            } catch (err) {
                console.warn('failed to load URL', err);
                showLoadError(`Could not load that URL — ${err.message || err}. The server must allow ` +
                    `cross-origin (CORS) Range requests.`);
            } finally {
                btn.disabled = false;
            }
        }

        async function load(source) {
            currentSource = source;
            drop.querySelector('.prompt').innerHTML =
                `<span class="fname">${escapeHtml(source.name)}</span>` +
                (source.size ? ` &mdash; ${fmtBytes(source.size)}` : '');

            // reset UI
            segmentDataStart = null;
            $('#tree-placeholder').hidden = true;
            const tree = $('#tree');
            tree.hidden = false;
            tree.innerHTML = '<li class="node"><span class="twisty leaf"></span><span class="ptype">parsing…</span></li>';
            $('#summary').classList.remove('show');
            $('#summary').innerHTML = '';
            resetHex();

            await wasmReady;

            // The wasm reader is a forward-only stream: get_payload() drains its element. So use
            // ONE reader for the interactive tree (kept un-consumed until the user expands nodes)
            // and a SEPARATE reader for the up-front metadata scan.
            const treeReader = EbmlReader.new_endless(BigInt(0), FetchSourceEbml.new(source.ebmlUrl));
            const headDoc = await treeReader.next();   // EBML header
            const bodyDoc = await treeReader.next();   // Segment

            // SeekPositions are relative to the Segment's payload start; cache it for jumps.
            if (bodyDoc && idHex(bodyDoc) === ID.Segment) {
                try {
                    const segOff = Number(bodyDoc.get_offset());
                    const head = new Uint8Array(await source.readBytes(segOff, 16));
                    segmentDataStart = segOff + payloadStart(head);
                } catch (err) { console.warn('could not resolve Segment data start', err); }
            }

            tree.innerHTML = '';
            for (const el of [headDoc, bodyDoc].filter(Boolean)) renderNode(el, tree);

            // metadata scan walks its own reader up to the first Cluster
            try {
                const metaReader = EbmlReader.new_endless(BigInt(0), FetchSourceEbml.new(source.ebmlUrl));
                await metaReader.next();                       // EBML header
                const metaSegment = await metaReader.next();   // Segment
                await scanMetadata(metaSegment);
            } catch (err) {
                console.warn('metadata scan failed', err);
            }
        }

        function showLoadError(msg) {
            $('#tree-placeholder').hidden = false;
            $('#tree-placeholder').innerHTML =
                `<h2>Load failed</h2><p>${escapeHtml(msg)}</p>`;
            $('#tree').hidden = true;
        }

        // ---------- metadata ----------
        async function scanMetadata(segmentDoc) {
            if (!segmentDoc) return;
            const segment = segmentDoc.get_payload();
            if (!segment || typeof segment.next !== 'function') return;

            const meta = { title: null, duration: null, scale: 1000000, tracks: [] };

            let el;
            while ((el = await segment.next())) {
                const id = idHex(el);
                if (id === ID.Info) {
                    const info = el.get_payload();
                    let f;
                    while ((f = await info.next())) {
                        const fid = idHex(f);
                        if (fid === ID.Title) meta.title = f.get_payload();
                        else if (fid === ID.Duration) meta.duration = Number(f.get_payload());
                        else if (fid === ID.TimestampScale) meta.scale = Number(f.get_payload());
                    }
                } else if (id === ID.Tracks) {
                    const tracks = el.get_payload();
                    let entry;
                    while ((entry = await tracks.next())) {
                        if (idHex(entry) !== ID.TrackEntry) continue;
                        meta.tracks.push(await readTrackEntry(entry.get_payload()));
                    }
                } else if (id === ID.Cluster) {
                    break; // media data begins; stop the cheap scan
                }
            }
            renderSummary(meta);
        }

        async function readTrackEntry(entry) {
            const t = { type: 'other', codec: null, name: null, lang: null, w: null, h: null, channels: null };
            let d;
            while ((d = await entry.next())) {
                const id = idHex(d);
                if (id === ID.TrackType) t.type = TRACK_TYPE[Number(d.get_payload())] || 'other';
                else if (id === ID.CodecID) t.codec = d.get_payload();
                else if (id === ID.TrackName) t.name = d.get_payload();
                else if (id === ID.Language) t.lang = t.lang || d.get_payload();
                else if (id === ID.LanguageBCP47) t.lang = d.get_payload();
                else if (id === ID.Video) {
                    const v = d.get_payload();
                    let vf;
                    while ((vf = await v.next())) {
                        const vid = idHex(vf);
                        if (vid === ID.PixelWidth) t.w = t.w || Number(vf.get_payload());
                        else if (vid === ID.PixelHeight) t.h = t.h || Number(vf.get_payload());
                        else if (vid === ID.DisplayWidth) t.w = Number(vf.get_payload());
                        else if (vid === ID.DisplayHeight) t.h = Number(vf.get_payload());
                    }
                } else if (id === ID.Audio) {
                    const a = d.get_payload();
                    let af;
                    while ((af = await a.next())) {
                        if (idHex(af) === ID.Channels) t.channels = Number(af.get_payload());
                    }
                }
            }
            return t;
        }

        function renderSummary(meta) {
            const sum = $('#summary');
            const cards = [];

            cards.push(card('Title', escapeHtml(meta.title || '—'), 'title-card'));

            const seconds = meta.duration != null ? meta.duration * meta.scale / 1e9 : null;
            cards.push(card('Duration', seconds != null ? fmtDuration(seconds) : '—'));

            const video = meta.tracks.find(t => t.type === 'video' && t.w && t.h);
            cards.push(card('Resolution', video ? `${video.w}×${video.h}` : '—'));

            const counts = meta.tracks.reduce((m, t) => (m[t.type] = (m[t.type] || 0) + 1, m), {});
            const countStr = Object.entries(counts).map(([k, v]) => `${v} ${k}`).join(' · ') || '—';
            cards.push(card('Streams', countStr));

            // streams list card
            let rows = meta.tracks.map(t => {
                const extras = [];
                if (t.w && t.h) extras.push(`${t.w}×${t.h}`);
                if (t.channels) extras.push(`${t.channels}ch`);
                return `<div class="stream-row">
                    <span class="badge ${t.type}">${t.type}</span>
                    <span class="codec">${escapeHtml(t.codec || '?')}</span>
                    ${t.lang ? `<span class="lang">[${escapeHtml(t.lang)}]</span>` : ''}
                    ${t.name ? `<span>${escapeHtml(t.name)}</span>` : ''}
                    ${extras.length ? `<span class="extra">${extras.join(' ')}</span>` : ''}
                </div>`;
            }).join('');
            if (!rows) rows = '<div class="stream-row codec">no track info</div>';
            cards.push(`<div class="card streams-card"><div class="label">Tracks &amp; languages</div>${rows}</div>`);

            sum.innerHTML = cards.join('');
            sum.classList.add('show');
        }

        function card(label, value, cls = '') {
            return `<div class="card ${cls}"><div class="label">${label}</div><div class="value">${value}</div></div>`;
        }

        // ---------- structure tree ----------
        function renderNode(el, container) {
            const li = document.createElement('li');
            const isMaster = el.get_payload_type() === 'Master';

            const off = el.get_offset();
            const size = el.get_size();
            const known = knownName(el);

            const node = document.createElement('div');
            node.className = 'node';
            node.dataset.offset = String(off);   // lets a jump highlight an already-loaded node
            node.innerHTML =
                `<span class="twisty${isMaster ? '' : ' leaf'}">▶</span>` +
                `<span class="id">${id0x(el)}</span>` +
                (known ? `<span class="name">${known}</span>` : '') +
                `<span class="ptype">${el.get_payload_type()}</span>` +
                inlineValue(el) +
                `<span class="size">@${off} · ${fmtElemSize(Number(size))}</span>`;
            const twisty = node.querySelector('.twisty');

            li.appendChild(node);
            container.appendChild(li);

            // selection -> hex
            node.addEventListener('click', (e) => {
                if (e.target === twisty) return;
                selectNode(node, el);
            });

            // SeekHead helpers: decode the binary SeekID, and turn each Seek into a jump target.
            const hexId = idHex(el);
            if (hexId === ID.SeekID) decodeSeekId(el, node);
            else if (hexId === ID.Seek) enhanceSeek(el, li, node);

            if (isMaster) {
                const childUl = document.createElement('ul');
                childUl.hidden = true;
                li.appendChild(childUl);

                let cursor = null;
                let exhausted = false;
                let loadMoreBtn = null;

                async function loadBatch() {
                    if (!cursor) cursor = el.get_payload();
                    for (let i = 0; i < BATCH; i++) {
                        const child = await cursor.next();
                        if (!child) { exhausted = true; break; }
                        renderNode(child, childUl);
                    }
                    if (loadMoreBtn) {
                        if (exhausted) loadMoreBtn.remove();
                        else childUl.appendChild(loadMoreBtn); // keep it last
                    } else if (!exhausted) {
                        loadMoreBtn = document.createElement('button');
                        loadMoreBtn.className = 'loadmore';
                        loadMoreBtn.textContent = 'load more…';
                        loadMoreBtn.addEventListener('click', (ev) => { ev.stopPropagation(); loadBatch(); });
                        childUl.appendChild(loadMoreBtn);
                    }
                }

                let loadedOnce = false;
                twisty.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const open = childUl.hidden;
                    childUl.hidden = !open;
                    twisty.classList.toggle('open', open);
                    if (open && !loadedOnce) { loadedOnce = true; await loadBatch(); }
                });
            }
        }

        // ---------- SeekHead navigation ----------
        // A SeekID/binary element's payload bytes ARE the target's EBML ID exactly as stored
        // (Info = 15 49 A9 66), so hex-encoding them keys straight into EL_NAMES — no stripping.
        async function readSeekIdHex(el) {
            if (!currentSource) return null;
            const off = Number(el.get_offset());
            const size = Number(el.get_size());
            const bytes = new Uint8Array(await currentSource.readBytes(off, size));
            const payload = bytes.subarray(payloadStart(bytes));
            if (!payload.length) return null;
            return Array.from(payload, b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        // Append "= 0x1549A966 (Info)" to a SeekID row once its bytes are read (async, post-render).
        async function decodeSeekId(el, node) {
            try {
                const hex = await readSeekIdHex(el);
                if (!hex) return;
                const name = EL_NAMES[hex];
                const span = document.createElement('span');
                span.className = 'val';
                span.textContent = `= 0x${hex}${name ? ` (${name})` : ''}`;
                node.insertBefore(span, node.querySelector('.size'));
            } catch (err) { console.warn('SeekID decode failed', err); }
        }

        // Summarize a Seek as "→ Target [↪ jump]". Reads the Seek's children with a FRESH reader
        // so it doesn't drain el's own payload (that would break the user's manual expand — see
        // the load() comment). Seek masters are tiny and few, so the eager read is cheap.
        async function enhanceSeek(el, li, node) {
            if (!currentSource) return;
            try {
                const r = EbmlReader.new_endless(BigInt(Number(el.get_offset())), FetchSourceEbml.new(currentSource.ebmlUrl));
                const seek = await r.next();
                if (!seek) return;
                const kids = seek.get_payload();
                if (!kids || typeof kids.next !== 'function') return;

                let targetHex = null, seekPos = null;
                let k;
                while ((k = await kids.next())) {
                    const kid = idHex(k);
                    if (kid === ID.SeekID) targetHex = await readSeekIdHex(k);
                    else if (kid === ID.SeekPosition) seekPos = Number(k.get_payload());
                }

                const sizeSpan = node.querySelector('.size');
                const targetName = (targetHex && EL_NAMES[targetHex]) || (targetHex ? `0x${targetHex}` : '?');
                const summary = document.createElement('span');
                summary.className = 'seek-target';
                summary.textContent = `→ ${targetName}`;
                node.insertBefore(summary, sizeSpan);

                if (seekPos != null && segmentDataStart != null) {
                    const absOffset = segmentDataStart + seekPos;
                    const btn = document.createElement('button');
                    btn.className = 'jumpbtn';
                    btn.textContent = '↪ jump';
                    btn.title = `Seek to file offset ${absOffset}`;
                    btn.addEventListener('click', (ev) => { ev.stopPropagation(); jumpTo(absOffset, li); });
                    node.insertBefore(btn, sizeSpan);
                }
            } catch (err) { console.warn('Seek enhance failed', err); }
        }

        // Random-access load of the element at absOffset, rendered as an expandable subtree under
        // the Seek's <li>. Random access is essential: Cues/Tags/trailing SeekHeads live at EOF, so
        // walking the sequential cursor there would stream every Cluster in between.
        async function jumpTo(absOffset, li) {
            if (!currentSource || segmentDataStart == null) return;

            li.querySelector(':scope > ul.jump-result')?.remove();   // re-click = re-jump

            const jumpUl = document.createElement('ul');
            jumpUl.className = 'jump-result';
            jumpUl.innerHTML = '<li class="node jump-status">jumping…</li>';
            li.appendChild(jumpUl);

            try {
                const r = EbmlReader.new_endless(BigInt(absOffset), FetchSourceEbml.new(currentSource.ebmlUrl));
                const target = await r.next();
                jumpUl.innerHTML = '';
                if (!target) {
                    jumpUl.innerHTML = `<li class="node jump-status err">nothing readable at offset ${absOffset}</li>`;
                    return;
                }
                renderNode(target, jumpUl);
                const newNode = jumpUl.querySelector(':scope > li > .node');
                if (newNode) {
                    newNode.classList.add('jumped');
                    newNode.scrollIntoView({ block: 'nearest' });
                    selectNode(newNode, target);
                }
                // Best-effort: also flash an already-loaded node at the same offset in the main tree
                // (skip the node we just created, which carries the same data-offset).
                const existing = Array.from($('#tree').querySelectorAll(`[data-offset="${absOffset}"]`))
                    .find(n => n !== newNode);
                if (existing) {
                    existing.classList.add('jump-flash');
                    existing.scrollIntoView({ block: 'nearest' });
                    setTimeout(() => existing.classList.remove('jump-flash'), 1200);
                }
            } catch (err) {
                console.warn('jump failed', err);
                jumpUl.innerHTML = `<li class="node jump-status err">jump failed — ${escapeHtml(String(err.message || err))}</li>`;
            }
        }

        // Element ID (hex, uppercase) -> human name. Module-level so SeekID decoding and the
        // Seek jump summary can reuse it, not just the tree's knownName().
        const EL_NAMES = {

                '1043A770': 'Chapters',

                // Tags Elements
                '1254C367': 'Tags',

        function knownName(el) {
            return EL_NAMES[idHex(el).toUpperCase()] || '';
        }

        function inlineValue(el) {
            const pt = el.get_payload_type();
            // Master/Binary have no scalar; skip it.
            if (pt === 'Master' || pt === 'Binary') return '';
            try {
                const v = el.get_payload();
                if (v == null) return '';
                if (typeof v === 'bigint' || typeof v === 'number' || typeof v === 'string') {
                    const s = String(v);
                    if (!s || s.length > 48) return '';
                    return `<span class="val">= ${escapeHtml(s)}</span>`;
                }
            } catch (_) { /* payload not a primitive */ }
            return '';
        }

        function selectNode(node, el) {
            if (selectedNode) selectedNode.classList.remove('selected');
            selectedNode = node;
            node.classList.add('selected');
            renderHex(el);
        }

        // ---------- hex pane ----------
        function resetHex() {
            $('#hex-head').innerHTML = 'Hex inspector';
            $('#hex').innerHTML = '<div class="hex-empty">&lsaquo; select an element to inspect its bytes &rsaquo;</div>';
        }

        async function renderHex(el) {
            if (!currentSource) return;
            const off = Number(el.get_offset());
            const total = Number(el.get_size());
            const len = Math.min(total, HEX_CAP);

            const note = total > HEX_CAP
                ? ` <span class="note">showing first ${fmtBytes(len)} of ${fmtElemSize(total)}</span>`
                : '';
            $('#hex-head').innerHTML =
                `<span class="sel-id">${id0x(el)}</span> ` +
                `<span class="sel-type">${el.get_payload_type()}</span> ` +
                `&middot; offset ${off} &middot; ${fmtElemSize(total)}${note}`;

            const hex = $('#hex');
            hex.innerHTML = '<div class="hex-empty">reading…</div>';

            const buf = await currentSource.readBytes(off, len);
            hex.innerHTML = hexDump(new Uint8Array(buf), off);
            hex.scrollTop = 0;
        }

        function hexDump(bytes, baseOffset) {
            const lines = [];
            for (let i = 0; i < bytes.length; i += 16) {
                const slice = bytes.subarray(i, i + 16);
                const addr = (baseOffset + i).toString(16).padStart(8, '0');

                let hx = '';
                let asc = '';
                for (let j = 0; j < 16; j++) {
                    if (j < slice.length) {
                        const b = slice[j];
                        const hh = b.toString(16).padStart(2, '0');
                        hx += b === 0 ? `<span class="z">${hh}</span>` : hh;
                        hx += (j === 7) ? '  ' : ' ';
                        if (b >= 0x20 && b < 0x7f) asc += escapeHtml(String.fromCharCode(b));
                        else asc += '<span class="np">.</span>';
                    } else {
                        hx += (j === 7) ? '    ' : '   ';
                        asc += ' ';
                    }
                }
                lines.push(`<div class="hline"><span class="off">${addr}</span>  ` +
                    `<span class="hx">${hx}</span> <span class="as">${asc}</span></div>`);
            }
            return lines.join('');
        }

        // ---------- helpers ----------
        // EBML vint length from its first byte (leading-zero count + 1).
        function vintLen(b) {
            let mask = 0x80, len = 1;
            while (len <= 8 && !(b & mask)) { mask >>= 1; len++; }
            return len;
        }

        // Where an element's payload begins within its raw bytes: past the ID vint + the size vint.
        function payloadStart(bytes) {
            return vintLen(bytes[0]) + vintLen(bytes[vintLen(bytes[0])]);
        }

        // EBML elements may declare an "unknown size" (all-ones vint), surfacing as a value far
        // larger than the file; show that as ∞ rather than a nonsensical "65536 TB".
        function fmtElemSize(n) {
            // An unknown-size element surfaces as a sentinel near u64::MAX (well
            // beyond Number.MAX_SAFE_INTEGER); a declared size larger than the
            // file is equally nonsensical. Show both as ∞ rather than TB garbage.
            if (!Number.isSafeInteger(n) ||
                (currentSource && currentSource.size && n > currentSource.size)) return '∞ unknown';
            return fmtBytes(n);
        }

        function fmtBytes(n) {
            if (n < 1024) return n + ' B';
            const u = ['KB', 'MB', 'GB', 'TB'];
            let i = -1;
            do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
            return n.toFixed(n < 10 ? 2 : 1) + ' ' + u[i];
        }

        function fmtDuration(sec) {
            sec = Math.round(sec);
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            const pad = (x) => String(x).padStart(2, '0');
            return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
