<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>matroska.js — MKV player</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
      }
      h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }
      /* The player markup is built into .stage by mkv-player-ui; menu/slider/subtitle
         styling comes from its style.css. */
      .stage { width: min(100%, 1100px); position: relative; }
      video-player { display: block; width: 100%; aspect-ratio: 16 / 9; background: #000; }
      video { width: 100%; height: 100%; }

      .panel {
        width: min(100%, 1100px);
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.25rem;
        align-items: center;
        background: #1b1b1b;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 0.75rem 1rem;
      }
      .panel label { font-size: 0.85rem; color: #bbb; display: flex; gap: 0.4rem; align-items: center; }

      /* --- Enhanced URL Input Styling --- */
      .panel input[type="text"] {
        width: 28rem;
        max-width: 60vw;
        background: #0d0d0d;
        color: #fff;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        padding: 0.45rem 0.6rem;
        font-family: inherit;
        font-size: 0.85rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }
      .panel input[type="text"]:focus {
        border-color: #555;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        background: #050505;
      }

      /* --- Enhanced File Input Styling --- */
      .panel input[type="file"] {
        font-size: 0;
        color: #aaa;
        cursor: pointer;
      }
      /* Customizing the "Choose File" button inside the file input */
      .panel input[type="file"]::file-selector-button {
        background: #252525;
        color: #eee;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        padding: 0.45rem 0.75rem;
        margin-right: 0.5rem;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .panel input[type="file"]::file-selector-button:hover {
        background: #303030;
        border-color: #444;
      }
      .panel input[type="file"]::file-selector-button:active {
        background: #1a1a1a;
      }

      .panel select, .panel button { background: #000; color: #eee; border: 1px solid #333; border-radius: 4px; padding: 0.35rem 0.5rem; }
      .panel button { cursor: pointer; }
      #status { font-size: 0.8rem; color: #8a8; min-height: 1em; width: min(100%, 1100px); white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>matroska.js — MKV → fMP4 → MSE player (video.js v10)</h1>

    <div class="panel">
      <input type="file" id="fileInput">
      <label>URL
        <input id="url" type="text" value="http://localhost:8501/example/toaru.mkv" />
      </label>
      <button id="load">Load</button>
      <button id="copy">Copy</button>
    </div>

    <div class="stage"></div>

    <div id="status"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
