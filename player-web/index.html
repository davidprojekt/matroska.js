<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>matroska.js — MKV player</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
      }
      h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }
      .stage { width: min(100%, 1100px); position: relative; }
      video-player { display: block; width: 100%; aspect-ratio: 16 / 9; background: #000; }
      video { width: 100%; height: 100%; }
      /* libass (JASSUB) overlay — created at runtime, sized/positioned by JASSUB over the
         video; pointer-events:none lets clicks through to the player controls. */
      .jassub-overlay { position: absolute; pointer-events: none; }

      /* The skin's icon CSS targets inline <svg class="media-icon">, but our ejected markup
         uses the <media-icon> wrapper element (renders the svg via innerHTML, defaults to
         display:inline where width/height and the scale-based --flipped transform are
         ignored). Give it a box so sizing and the seek-back flip work. */
      media-icon { display: inline-flex; line-height: 0; }
      media-icon > svg { width: 100%; height: 100%; }

      /* The volume slider's parts don't receive `data-orientation` from the slider context
         in this ejected/popover setup, so the skin's orientation-gated geometry never
         applies (track has no size, thumb stuck). Set the vertical geometry explicitly;
         --media-slider-fill is still updated by the slider JS as the volume changes. */
      .media-default-skin .media-popover--volume .media-slider { width: 2rem; height: 5rem; }
      .media-default-skin .media-popover--volume .media-slider__track { width: 0.25rem; height: 100%; }
      .media-default-skin .media-popover--volume .media-slider__fill {
        inset-inline: 0;
        bottom: 0;
        height: var(--media-slider-fill);
      }
      .media-default-skin .media-popover--volume .media-slider__thumb {
        top: calc(100% - var(--media-slider-fill));
        left: 50%;
      }

      /* Previous/next-chapter skip buttons. */
      .vjs-chapter-skip { font-size: 1rem; line-height: 1; padding: 0 0.45rem; }

      /* Chapter boundary ticks overlaid on the time slider. Non-interactive so seeking
         still works; sits above the track/fill but below the thumb. */
      .vjs-chapter-markers { position: absolute; inset-inline: 0; top: 50%; height: 0.7rem; transform: translateY(-50%); pointer-events: none; z-index: 5; }
      .vjs-chapter-marker { position: absolute; top: 0; bottom: 0; width: 2px; transform: translateX(-50%); background: color-mix(in srgb, currentColor 55%, transparent); border-radius: 1px; }

      /* Custom Audio/Subtitle dropdown menus in the control bar. */
      .vjs-menu { position: relative; display: inline-flex; align-items: center; }
      .vjs-menu__trigger { font-size: 0.8125rem; padding: 0 0.6rem; min-width: auto; }
      .vjs-menu__popup {
        position: absolute;
        bottom: calc(100% + 0.5rem);
        right: 0;
        min-width: 12rem;
        max-height: 16rem;
        overflow-y: auto;
        padding: 0.25rem;
        border-radius: 0.5rem;
        display: flex;
        flex-direction: column;
        z-index: 30;
      }
      .vjs-menu__popup[hidden] { display: none; }
      .vjs-menu__item {
        display: flex;
        gap: 0.4rem;
        align-items: center;
        background: transparent;
        border: 0;
        color: inherit;
        font: inherit;
        text-align: left;
        padding: 0.4rem 0.6rem;
        border-radius: 0.375rem;
        cursor: pointer;
        white-space: nowrap;
      }
      .vjs-menu__item::before { content: ""; display: inline-block; width: 1ch; flex: none; }
      .vjs-menu__item[aria-checked="true"]::before { content: "✓"; }
      .vjs-menu__item:hover:not([disabled]) { background: color-mix(in srgb, currentColor 14%, transparent); }
      .vjs-menu__item[disabled] { opacity: 0.4; cursor: default; }
      .panel {
        width: min(100%, 1100px);
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.25rem;
        align-items: center;
        background: #1b1b1b;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 0.75rem 1rem;
      }
      .panel label { font-size: 0.85rem; color: #bbb; display: flex; gap: 0.4rem; align-items: center; }

      /* --- Enhanced URL Input Styling --- */
      .panel input[type="text"] {
        width: 28rem;
        max-width: 60vw;
        background: #0d0d0d;
        color: #fff;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        padding: 0.45rem 0.6rem;
        font-family: inherit;
        font-size: 0.85rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }
      .panel input[type="text"]:focus {
        border-color: #555;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        background: #050505;
      }

      /* --- Enhanced File Input Styling --- */
      .panel input[type="file"] {
        font-size: 0;
        color: #aaa;
        cursor: pointer;
      }
      /* Customizing the "Choose File" button inside the file input */
      .panel input[type="file"]::file-selector-button {
        background: #252525;
        color: #eee;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        padding: 0.45rem 0.75rem;
        margin-right: 0.5rem;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .panel input[type="file"]::file-selector-button:hover {
        background: #303030;
        border-color: #444;
      }
      .panel input[type="file"]::file-selector-button:active {
        background: #1a1a1a;
      }

      .panel select, .panel button { background: #000; color: #eee; border: 1px solid #333; border-radius: 4px; padding: 0.35rem 0.5rem; }
      .panel button { cursor: pointer; }
      #status { font-size: 0.8rem; color: #8a8; min-height: 1em; width: min(100%, 1100px); white-space: pre-wrap; }
      .hint { width: min(100%, 1100px); font-size: 0.75rem; color: #888; margin-top: -0.5rem; }
      .hint strong { color: #bbb; }
    </style>
  </head>
  <body>
  <h1>matroska.js — MKV → fMP4 → MSE player (video.js v10)</h1>

  <div class="panel" style="display: none;">
    <label>Torrent / magnet
      <input id="magnet" type="text" placeholder="magnet:?xt=urn:btih:…"
             value="magnet:?xt=urn:btih:08ada5a7a6183aae1e09d831df6748d566095a10&dn=Sintel&tr=wss%3A%2F%2Ftracker.openwebtorrent.com&tr=wss%3A%2F%2Ftracker.webtorrent.dev" />
    </label>
    <input type="file" id="torrentFile" accept=".torrent">
    <button id="fetchTorrent">Fetch metadata</button>
    <label id="torrentFilesLabel" hidden>File
      <select id="torrentFiles"></select>
    </label>
  </div>
  <div class="hint" style="display: none;">
    Browser WebTorrent only connects to <strong>WebRTC-seeded</strong> torrents (WSS trackers / web seeds).
    A normal magnet with no web peers will hang at “fetching metadata”. The prefilled Sintel magnet works.
  </div>

  <div class="panel">
    <input type="file" id="fileInput">
    <label>URL
      <input id="url" type="text" value="http://localhost:8501/example/toaru.mkv" />
    </label>
    <button id="load">Load</button>
    <button id="copy">Copy</button>
  </div>

    <div class="stage">
      <video-player>
        <media-container class="media-default-skin media-default-skin--video">
          <video playsinline crossorigin="anonymous"></video>

          <media-buffering-indicator class="media-buffering-indicator">
            <div class="media-surface">
              <media-icon name="spinner" class="media-icon"></media-icon>
            </div>
          </media-buffering-indicator>

          <media-controls class="media-surface media-controls">
            <media-tooltip-group>
              <div class="media-button-group">
                <media-play-button commandfor="play-tooltip" class="media-button media-button--subtle media-button--icon media-button--play">
                  <media-icon name="restart" class="media-icon media-icon--restart"></media-icon>
                  <media-icon name="play" class="media-icon media-icon--play"></media-icon>
                  <media-icon name="pause" class="media-icon media-icon--pause"></media-icon>
                </media-play-button>
                <media-tooltip id="play-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>

                <button type="button" id="prevChapter" class="media-button media-button--subtle vjs-chapter-skip" title="Previous chapter" aria-label="Previous chapter" hidden>⏮</button>

                <media-seek-button commandfor="seek-backward-tooltip" seconds="-10" class="media-button media-button--subtle media-button--icon media-button--seek">
                  <span class="media-icon__container">
                    <media-icon name="seek" class="media-icon media-icon--flipped"></media-icon>
                    <span class="media-icon__label">10</span>
                  </span>
                </media-seek-button>
                <media-tooltip id="seek-backward-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>

                <media-seek-button commandfor="seek-forward-tooltip" seconds="10" class="media-button media-button--subtle media-button--icon media-button--seek">
                  <span class="media-icon__container">
                    <media-icon name="seek" class="media-icon"></media-icon>
                    <span class="media-icon__label">10</span>
                  </span>
                </media-seek-button>
                <media-tooltip id="seek-forward-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>

                <button type="button" id="nextChapter" class="media-button media-button--subtle vjs-chapter-skip" title="Next chapter" aria-label="Next chapter" hidden>⏭</button>
              </div>

              <div class="media-time-controls">
                <media-time type="current" class="media-time"></media-time>
                <media-time-slider class="media-slider">
                  <media-slider-track class="media-slider__track">
                    <media-slider-fill class="media-slider__fill"></media-slider-fill>
                    <media-slider-buffer class="media-slider__buffer"></media-slider-buffer>
                  </media-slider-track>
                  <div class="vjs-chapter-markers" id="chapterMarkers"></div>
                  <media-slider-thumb class="media-slider__thumb"></media-slider-thumb>
                </media-time-slider>
                <media-time type="duration" class="media-time"></media-time>
              </div>

              <div class="media-button-group">
                <!-- Chapter menu (custom, app-driven) -->
                <div class="vjs-menu">
                  <button type="button" id="chaptersTrigger" class="media-button media-button--subtle vjs-menu__trigger" aria-haspopup="true" aria-expanded="false" title="Chapters" hidden>Chapters</button>
                  <div id="chaptersMenu" class="media-surface vjs-menu__popup" role="menu" hidden></div>
                </div>
                <!-- Audio track menu (custom, app-driven) -->
                <div class="vjs-menu">
                  <button type="button" id="audioTrigger" class="media-button media-button--subtle vjs-menu__trigger" aria-haspopup="true" aria-expanded="false" title="Audio track" hidden>Audio</button>
                  <div id="audioMenu" class="media-surface vjs-menu__popup" role="menu" hidden></div>
                </div>
                <!-- Subtitle track menu (custom, app-driven) -->
                <div class="vjs-menu">
                  <button type="button" id="subsTrigger" class="media-button media-button--subtle vjs-menu__trigger" aria-haspopup="true" aria-expanded="false" title="Subtitles" hidden>Subs</button>
                  <div id="subsMenu" class="media-surface vjs-menu__popup" role="menu" hidden></div>
                </div>

                <media-mute-button commandfor="video-volume-popover" class="media-button media-button--subtle media-button--icon media-button--mute">
                  <media-icon name="volume-off" class="media-icon media-icon--volume-off"></media-icon>
                  <media-icon name="volume-low" class="media-icon media-icon--volume-low"></media-icon>
                  <media-icon name="volume-high" class="media-icon media-icon--volume-high"></media-icon>
                </media-mute-button>
                <media-popover id="video-volume-popover" open-on-hover delay="200" close-delay="100" side="top" class="media-surface media-popover media-popover--volume">
                  <media-volume-slider class="media-slider" orientation="vertical" thumb-alignment="edge">
                    <media-slider-track class="media-slider__track">
                      <media-slider-fill class="media-slider__fill"></media-slider-fill>
                    </media-slider-track>
                    <media-slider-thumb class="media-slider__thumb media-slider__thumb--persistent"></media-slider-thumb>
                  </media-volume-slider>
                </media-popover>

                <media-fullscreen-button commandfor="fullscreen-tooltip" class="media-button media-button--subtle media-button--icon media-button--fullscreen">
                  <media-icon name="fullscreen-enter" class="media-icon media-icon--fullscreen-enter"></media-icon>
                  <media-icon name="fullscreen-exit" class="media-icon media-icon--fullscreen-exit"></media-icon>
                </media-fullscreen-button>
                <media-tooltip id="fullscreen-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
              </div>
            </media-tooltip-group>
          </media-controls>

          <div class="media-overlay"></div>

          <media-hotkey keys="Space" action="togglePaused"></media-hotkey>
          <media-hotkey keys="k" action="togglePaused"></media-hotkey>
          <media-hotkey keys="m" action="toggleMuted"></media-hotkey>
          <media-hotkey keys="f" action="toggleFullscreen"></media-hotkey>
          <media-hotkey keys="ArrowRight" action="seekStep" value="5"></media-hotkey>
          <media-hotkey keys="ArrowLeft" action="seekStep" value="-5"></media-hotkey>
          <media-hotkey keys="ArrowUp" action="volumeStep" value="0.05"></media-hotkey>
          <media-hotkey keys="ArrowDown" action="volumeStep" value="-0.05"></media-hotkey>

          <media-gesture type="tap" action="togglePaused" pointer="mouse" region="center"></media-gesture>
          <media-gesture type="doubletap" action="toggleFullscreen" region="center"></media-gesture>
        </media-container>
      </video-player>
    </div>

    <div id="status"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
